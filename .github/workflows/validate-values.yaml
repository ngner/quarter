---
name: Validate Quarter values

on:
  push:
    branches: [main]
    paths:
      - "values-global.yaml"
      - "values-hub.yaml"
      - "pattern-metadata.yaml"
      - ".github/workflows/validate-values.yaml"
  pull_request:
    branches: [main]
    paths:
      - "values-global.yaml"
      - "values-hub.yaml"
      - "pattern-metadata.yaml"
      - ".github/workflows/validate-values.yaml"

permissions:
  contents: read

jobs:
  clustergroup-schema:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install check-jsonschema
        run: pip install check-jsonschema

      - uses: chrisdickinson/setup-yq@fa3192edd79d6eb0e4e12de8dde3a0c26f2b853b # 2025-08-25
        with:
          yq-version: v4.30.7

      - name: Merge values and validate against clustergroup schema
        run: |
          set -euo pipefail
          yq eval-all '. as $item ireduce ({}; . * $item )' values-global.yaml values-hub.yaml > /tmp/merged-quarter.yaml
          check-jsonschema --fill-defaults \
            --schemafile https://raw.githubusercontent.com/validatedpatterns/clustergroup-chart/refs/heads/main/values.schema.json \
            /tmp/merged-quarter.yaml
